  <h1 class="subtitle is-size-4-mobile is-size-3-desktop">为什么选择hugo搭建我的博客</h1>
  <div class="content">
    <p>为什么我会选择hugo写文章，主要原因是因为部署快速，没有那么多的复杂程序
1.简单明了
2.采用markdown语法写作
3.静态博客没有冗长的插件，打开网页比较快。
以后优点再看吧。</p>
